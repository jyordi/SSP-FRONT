<nav class="navbar">
  <div class="brand">
    <img src="https://pbs.twimg.com/profile_images/1553024740645867521/Y01tlpcP_400x400.jpg" alt="Logo" class="logo-img">
    <div>
      <span class="brand-name">{{ config.brandName }}</span>
      <span class="brand-sub">{{ config.brandSubtitle }}</span>
    </div>
  </div>

  <div class="nav-links">
    @for (link of config.links; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="active" class="nav-link">
        {{ link.label }}
      </a>
    }
  </div>

  <div class="nav-end">
    @if (config.showSearch) {
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input class="search" type="text" [placeholder]="config.searchPlaceholder || 'Buscar...'">
      </div>
    }
  </div>
</nav>

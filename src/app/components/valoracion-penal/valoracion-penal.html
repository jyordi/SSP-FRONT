<app-navbar-reconecta></app-navbar-reconecta>

<!-- TOAST NOTIFICATION -->
<div class="toast-wrap" *ngIf="toast">
  <div class="toast" [class.toast-ok]="toast.tipo==='ok'" [class.toast-err]="toast.tipo==='error'">
    {{ toast.msg }}
  </div>
</div>

<div class="page-container">
  <main class="content-wrapper">

    <!-- HEADER -->
    <header class="page-header slide-up">
      <div class="header-info">
        <button class="btn-back" (click)="regresar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Volver
        </button>
        <div class="header-titles">
          <h1>Resumen de Valoración Psicológica</h1>
          <p>Expediente Penal: <span class="badge">{{ numeroExpediente }}</span> | Beneficiario: <strong>{{ nombreBeneficiario }}</strong></p>
        </div>
      </div>
    </header>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" *ngIf="loading">
      <div class="spinner"></div>
      <p>Guardando valoración...</p>
    </div>

    <!-- MAIN FORM CAJA ÚNICA -->
    <div class="form-section slide-up d1">
      <div class="card card-form">
        
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <!-- ROW 1: BASICS -->
          <div class="grid-form-2col">
            <div class="field">
              <label>Fecha de Estudio</label>
              <div class="input-wrap">
                <svg class="input-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <input type="date" formControlName="fechaEstudio">
              </div>
            </div>

            <div class="field">
              <label>Motivo de la Valoración</label>
              <div class="input-wrap">
                <svg class="input-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <input type="text" formControlName="motivoValoracion" placeholder="Ej. Valoración inicial requerida por el juez">
              </div>
            </div>
          </div>

          <hr class="divider">

          <!-- JSONB: SECCIONES -->
          <div formGroupName="seccionesJsonb">
            
            <h3 class="section-title">Análisis Principal</h3>

            <div class="grid-form-2col">
              <div class="field full-width">
                <label>Metodología Aplicada</label>
                <input type="text" formControlName="metodologia" placeholder="Ej. Entrevista clínica psicológica conductual">
              </div>

              <div formGroupName="datos_generales" class="field nested">
                <label>Escolaridad (Auto-rellenado)</label>
                <input type="text" formControlName="escolaridad">
              </div>

              <div formGroupName="datos_generales" class="field nested">
                <label>Ocupación (Auto-rellenado)</label>
                <input type="text" formControlName="ocupacion">
              </div>

              <div class="field full-width">
                <label>Apariencia y Actitud durante Entrevista</label>
                <div class="grid-form-2col-inner">
                  <input type="text" formControlName="apariencia" placeholder="Apariencia general (Ej. Adecuada)">
                  <input type="text" formControlName="actitud_entrevista" placeholder="Actitud (Ej. Colaborador y asertivo)">
                </div>
              </div>

              <div formGroupName="examen_mental" class="field full-width card-inner">
                <label>Examen Mental</label>
                <div class="grid-form-2col-inner">
                  <input type="text" formControlName="orientacion" placeholder="Orientación (Ej. Conservada)">
                  <input type="text" formControlName="memoria" placeholder="Memoria (Ej. Adecuada / Focal)">
                </div>
              </div>
            </div>

          </div>

          <hr class="divider">

          <!-- OBSERVACIONES Y CONCLUSIONES -->
          <h3 class="section-title">Conclusiones y Referencia</h3>

          <div class="grid-form-1col">
            <div class="field">
              <label>Observaciones Generales</label>
              <textarea formControlName="observacionesGenerales" rows="3" placeholder="Sintomatología notable o impresiones clínicas"></textarea>
            </div>

            <!-- JSONB: Pruebas y Acciones -->
            <div formGroupName="resultadosPruebas" class="field">
              <label>Resultados de Pruebas (Opcional)</label>
              <input type="text" formControlName="test_1" placeholder="Ej. BDI-II: Ansiedad Severa">
            </div>

            <div formGroupName="accionDerivada" class="field">
              <label>Acción Derivada (Canalización)</label>
              <input type="text" formControlName="canalizacion" placeholder="Ej. Canalización psiquiátrica urgente">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
              {{ modoEdicion ? 'Actualizar Valoración' : 'Guardar Valoración Completa' }}
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            </button>
          </div>

        </form>

      </div>
    </div>

  </main>
</div>

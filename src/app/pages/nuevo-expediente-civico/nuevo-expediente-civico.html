<div class="page">

  <!-- NAV -->
  <div class="top-bar">
    <div>
      <strong>{{userName}}</strong>
      <span class="role">({{role}})</span>
    </div>
  </div>

  <!-- 🔥 FORM BENEFICIARIO -->
  <div class="card" *ngIf="step === 1">
    <h2>Nuevo Beneficiario</h2>

    <form [formGroup]="beneficiarioForm">

      <div class="grid">
        <input placeholder="Nombre *" formControlName="nombre">
        <input placeholder="Tiempo Asignado *" formControlName="tiempoAsignado">
        <input placeholder="unidad de tiempo *" formControlName="unidadDeTiempo">
        <input placeholder="URL Foto *" formControlName="urlFoto" class="full">
      </div>

      <button type="button" (click)="crearBeneficiario()" [disabled]="loading">
        Guardar Beneficiario
      </button>

    </form>
  </div>

  <!-- 🔥 FORM EXPEDIENTE -->
  <div class="card" *ngIf="step === 2">
    <h2>Nuevo Expediente Cívico</h2>

    <form [formGroup]="form">

      <div class="grid">

        <input placeholder="Beneficiario ID *" formControlName="beneficiarioId" readonly>
        <input placeholder="Folio *" formControlName="folioExpediente">
        <input placeholder="Causa Penal *" formControlName="causaPenal">
        <input placeholder="Juez Cívico *" formControlName="juezCivico">
        <input type="date" formControlName="fechaInicioSentencia">
        <input placeholder="Horas *" formControlName="horasSentencia">

        <input placeholder="Nombre Madre *" formControlName="madreNombre" class="full">
        <input placeholder="Teléfono Madre *" formControlName="madreTelefono" class="full">

      </div>

      <button type="button" (click)="submit()" [disabled]="loading">
        Guardar Expediente
      </button>

    </form>
  </div>

  <!-- LOADING -->
  <div *ngIf="loading" class="overlay">
    <div class="spinner"></div>
    <p>Guardando...</p>
  </div>

  <!-- SUCCESS -->
  <div *ngIf="success" class="overlay success">
    ✔ Expediente creado
  </div>

</div>

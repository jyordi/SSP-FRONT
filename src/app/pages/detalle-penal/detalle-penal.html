<div *ngIf="loading" class="overlay">
  <div class="loader"></div>
  <p>Cargando expediente...</p>
</div>

<div *ngIf="expediente" class="container fade">

  <!-- HEADER -->
  <div class="header">
    <button class="btn-back" (click)="volver()">←</button>
    <h2>Expediente Penal</h2>
  </div>

  <!-- FOTO -->
  <div class="foto-card">

    <img 
      class="avatar"
      [src]="previewUrl || expediente?.beneficiario?.urlFoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'"
    >

    <h3>{{ expediente?.beneficiario?.nombre }}</h3>

    <!-- 🔐 SOLO ADMIN -->
    <input 
      *ngIf="esAdmin()"
      type="file" 
      (change)="onFileSelected($event)" 
      accept="image/*"
    >

  </div>

  <!-- BOTONES -->
  <div class="modulos-top">
    <button *ngIf="esAdmin() || esPsicologo()" (click)="irModulo('/vp')">🧠 Psicología</button>
    <button *ngIf="esAdmin() || esTrabajoSocial()" (click)="irModulo('/trabajo-social')">👥 Trabajo Social</button>
    <button *ngIf="esAdmin()" (click)="irModulo('/plan-individualizado')">📋 Plan</button>
    <button *ngIf="esAdmin()" (click)="irModulo('/caratura-expediente')">📄 Carátula</button>
    <button *ngIf="esAdmin() || esPsicologo()" (click)="irModulo('/proyecto-vida')">🌱 Proyecto</button>
  </div>

  <!-- FORM -->
  <div class="card">

    <h3>Información general</h3>

    <div class="form-group">
      <label>Delito</label>
      <input [(ngModel)]="expediente.delito">
    </div>

    <div class="form-group">
      <label>Juzgado</label>
      <input [(ngModel)]="expediente.juzgado">
    </div>

    <div class="form-group">
      <label>Agraviado</label>
      <input [(ngModel)]="expediente.agraviado">
    </div>

    <div class="form-group">
      <label>Medida cautelar</label>
      <input [(ngModel)]="expediente.medidaCautelar">
    </div>

    <div class="form-group">
      <label>Observaciones</label>
      <textarea [(ngModel)]="expediente.observaciones"></textarea>
    </div>

    <button class="btn-guardar"
      (click)="guardarCambios()"
      [disabled]="guardando">
      {{ guardando ? 'Guardando...' : 'Guardar cambios' }}
    </button>

  </div>

  <!-- 🧠 VALORACIÓN -->
  <div class="card valoracion" *ngIf="!loadingValoracion">

    <h3>🧠 Valoración Psicológica</h3>

    <div *ngIf="valoracion; else sinValoracion">

      <p><strong>Diagnóstico:</strong> {{ valoracion?.diagnostico }}</p>
      <p><strong>Observaciones:</strong> {{ valoracion?.observaciones }}</p>

    </div>

    <ng-template #sinValoracion>
      <p class="empty">No hay valoración psicológica registrada</p>
    </ng-template>

  </div>

</div>
